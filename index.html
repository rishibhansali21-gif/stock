// ══ GST HELPERS ══
function calcGST(subtotal, rate, type) {
  var gst = subtotal * (rate / 100);
  var result = { rate: rate, subtotal: subtotal, gstAmount: gst, total: subtotal + gst };
  if(type === 'intra') {
    result.cgst = gst / 2;
    result.sgst = gst / 2;
    result.igst = 0;
  } else {
    result.cgst = 0;
    result.sgst = 0;
    result.igst = gst;
  }
  return result;
}

function gstBreakdownHTML(g, type) {
  if(!g.rate) return '<span style="color:var(--muted)">No GST applied</span>';
  var rows = '';
  if(type === 'intra') {
    rows = '<div style="display:flex;justify-content:space-between;margin-bottom:2px"><span>CGST ('+g.rate/2+'%)</span><span>+'+fv(g.cgst)+'</span></div>'
         + '<div style="display:flex;justify-content:space-between;margin-bottom:2px"><span>SGST ('+g.rate/2+'%)</span><span>+'+fv(g.sgst)+'</span></div>';
  } else {
    rows = '<div style="display:flex;justify-content:space-between;margin-bottom:2px"><span>IGST ('+g.rate+'%)</span><span>+'+fv(g.igst)+'</span></div>';
  }
  return rows + '<div style="display:flex;justify-content:space-between;font-weight:700;border-top:1px solid #b8d0f4;padding-top:4px;margin-top:2px"><span>Total GST</span><span>+'+fv(g.gstAmount)+'</span></div>';
}

function billGSTSection(g, type) {
  if(!g.rate) return '';
  var rows = '<div style="font-weight:700;margin-bottom:6px;font-size:12px;color:#6b5c3e;text-transform:uppercase;letter-spacing:0.5px">Tax Breakdown</div>';
  if(type === 'intra') {
    rows += '<div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px"><span>Subtotal</span><span>'+fv(g.subtotal)+'</span></div>';
    rows += '<div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px"><span>CGST @'+g.rate/2+'%</span><span>+'+fv(g.cgst)+'</span></div>';
    rows += '<div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px"><span>SGST @'+g.rate/2+'%</span><span>+'+fv(g.sgst)+'</span></div>';
  } else {
    rows += '<div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px"><span>Subtotal</span><span>'+fv(g.subtotal)+'</span></div>';
    rows += '<div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px"><span>IGST @'+g.rate+'%</span><span>+'+fv(g.igst)+'</span></div>';
  }
  return rows;
}

  try {
    var doc = await db.collection('users').doc(user.uid).get();

// ══ STATS ══
function updateStats(){
  var tot = inv.reduce(function(a,f){ return a + f.meters; }, 0);
  var low = inv.filter(function(f){ return f.meters < f.threshold; }).length;
  var val = inv.reduce(function(a,f){ return a + (f.meters * f.rate); }, 0);
  
  document.getElementById('st-c').textContent = inv.length;
  document.getElementById('st-m').textContent = tot.toLocaleString('en-IN') + 'm';
  document.getElementById('st-l').textContent = low;
  document.getElementById('st-v').textContent = fv(val);
  
  var b = document.getElementById('low-badge');
  b.textContent = low;
  b.classList.toggle('on', low > 0);
  
  var ban = document.getElementById('low-banner');
  if(low > 0){
      document.getElementById('low-banner-txt').textContent = inv.filter(function(f){ return f.meters < f.threshold; }).map(function(f){ return f.name; }).join(', ') + ' — reorder karo!';
      ban.style.display = 'block';
  } else {
      ban.style.display = 'none';
  }
}

function fv(v){
    if(v === undefined || v === null) return '₹0';
    v = Math.round(v);
    if(v >= 10000000) return '₹' + (v / 10000000).toFixed(1) + 'Cr';
    if(v >= 100000) return '₹' + (v / 100000).toFixed(1) + 'L';
    return '₹' + v.toLocaleString('en-IN');
}

// ══ FABRIC CARD ══
function fabCardHTML(f){
  var pct = Math.min(100, Math.round(f.meters / Math.max(f.threshold * 3, 1) * 100));
  var st = (f.meters < f.threshold) ? 'low' : f.meters < f.threshold * 1.5 ? 'med' : 'ok';
  var pill = st === 'low' ? '<span class="fab-tag" style="color:var(--red);border-color:#f4b0ac">⚠ Low Stock</span>' : st === 'med' ? '<span class="fab-tag" style="color:var(--orange);border-color:#f4c09a">▼ Running Low</span>' : '<span class="fab-tag" style="color:var(--green2);border-color:#aadec0">✓ OK</span>';
  var bc = st === 'ok' ? 'var(--green2)' : st === 'med' ? 'var(--orange)' : 'var(--red)';
  var ic = ICONS[f.type] || '🧵', bg = COLORS[f.type] || '#f5efe0';
  
  return '<div class="fab-card '+st+'">'
    +'<div class="fab-left">'
      +'<div class="fab-icon" style="background:'+bg+'">'+ic+'</div>'
      +'<div>'
        +'<div class="fab-name">'+esc(f.name)+'</div>'
        +'<div class="fab-meta"><span class="fab-tag">'+f.type+'</span><span class="fab-tag">'+f.color+'</span><span class="fab-tag">'+esc(f.supplier)+'</span>'+pill+'</div>'
        +'<div class="fab-bar-wrap" style="margin-top:8px"><div class="fab-bar"><div class="fab-bar-f" style="width:'+pct+'%;background:'+bc+'"></div></div></div>'
      +'</div>'
    +'</div>'
    +'<div class="fab-right">'
      +'<div class="fab-meter-box"><div class="fab-meter-num">'+f.meters.toLocaleString('en-IN')+'</div><div class="fab-meter-lbl">Meters</div></div>'
      +'<div style="text-align:center"><div style="font-family:var(--ff-h);font-size:15px;font-weight:700;color:var(--muted2)">₹'+f.rate+'/m</div><div style="font-size:12px;color:var(--muted)">'+fv(f.meters*f.rate)+'</div></div>'
      +'<div class="fab-actions">'
        +'<button class="fab-btn fab-btn-add" onclick="openAddStock('+f.id+')">📥 Add</button>'
        +'<button class="fab-btn fab-btn-sell" onclick="openQS('+f.id+')">💰 Sell</button>'
        +'<button class="fab-btn fab-btn-del" onclick="delFab('+f.id+')" title="Delete">🗑️</button>'
      +'</div>'
    +'</div>'
  +'</div>';
}

function renderDash(){
  var el = document.getElementById('dash-grid');
  if(!inv.length){
      el.innerHTML='<div class="empty"><div class="empty-ic">🧵</div><div class="empty-t">No Fabric Added</div><div class="empty-s">Add your first fabric to get started!</div><button class="btn btn-gold" onclick="openModal()" style="margin:0 auto">+ Add First Fabric</button></div>';
      return;
  }
  el.innerHTML = inv.slice(0, 7).map(fabCardHTML).join('');
}

function filterCat(cat, el){
    selCatV = cat;
    document.querySelectorAll('.cat-p').forEach(function(p){ p.classList.remove('active'); });
    if(el) el.classList.add('active');
    renderInv();
}

function renderInv(){
  var q = (document.getElementById('inv-q')||{value:''}).value.toLowerCase();
  var list = inv.filter(function(f){ return(!selCatV||f.type===selCatV) && (f.name.toLowerCase().includes(q) || f.type.toLowerCase().includes(q) || f.color.toLowerCase().includes(q)); });
  var el = document.getElementById('inv-grid');
  
  if(!list.length){
      el.innerHTML='<div class="empty"><div class="empty-ic">🔍</div><div class="empty-t">No results found</div></div>';
      return;
  }
  el.innerHTML = list.map(fabCardHTML).join('');
}

function delFab(id){
    if(!confirm('Delete this fabric?')) return;
    inv = inv.filter(function(f){ return f.id !== id; });
    save(); updateStats(); renderDash(); renderInv();
    toast('Fabric deleted');
}

// ══ MAIN MODAL (ADD FABRIC) ══
function openModal(){ document.getElementById('add-modal').classList.add('on'); document.getElementById('m-name').focus(); }
function closeModal(){
    document.getElementById('add-modal').classList.remove('on');
    ['m-name','m-color','m-m','m-t','m-r','m-s'].forEach(function(id){ document.getElementById(id).value=''; });
}
function saveModal(){
  var name = document.getElementById('m-name').value.trim();
  var m = parseFloat(document.getElementById('m-m').value) || 0;
  if(!name){ toast('Fabric name required!'); return; }
  
  var ex = inv.find(function(f){ return f.name.toLowerCase() === name.toLowerCase(); });
  if(ex){
      ex.meters += m;
      toast('✓ ' + m + 'm added to ' + name);
  } else {
      inv.push({
          id: Date.now(),
          name: name,
          type: document.getElementById('m-type').value,
          color: document.getElementById('m-color').value.trim() || '—',
          meters: m,
          threshold: parseFloat(document.getElementById('m-t').value) || 50,
          rate: parseFloat(document.getElementById('m-r').value) || 0,
          supplier: document.getElementById('m-s').value.trim() || '—',
          addedAt: new Date().toISOString()
      });
  }
  save(); updateStats(); renderDash(); renderInv(); closeModal();
  toast('✓ Added!');
}

// ══ ADD STOCK (EXISTING FABRIC) ══
function openAddStock(id){
  asFabId = id;
  var f = inv.find(function(f){ return f.id === id; });
  if(!f) return;
  document.getElementById('addstock-fab-name').textContent = f.name + ' — Current: ' + f.meters + 'm';
  ['as-m','as-r','as-s','as-gstin'].forEach(function(i){ document.getElementById(i).value=''; });
  document.getElementById('addstock-modal').classList.add('on');
  document.getElementById('as-m').focus();
}
function closeAddStock(){ document.getElementById('addstock-modal').classList.remove('on'); }

function saveAddStock(){
  var m = parseFloat(document.getElementById('as-m').value);
  if(!m || m <= 0){ toast('Enter meters!'); return; }
  
  var f = inv.find(function(f){ return f.id === asFabId; });
  if(!f) return;
  
  f.meters += m;
  var r = parseFloat(document.getElementById('as-r').value);
  if(r > 0) f.rate = r;
  
  var s = document.getElementById('as-s').value.trim();
  if(s) f.supplier = s;
  
  var gstin = document.getElementById('as-gstin').value.trim();
  purchases.unshift({
      id: Date.now(),
      party: f.supplier || 'Unknown',
      supplierGstin: gstin,
      item: f.name,
      meters: m,
      rate: f.rate,
      total: m * f.rate,
      gstRate: 0,
      gstAmount: 0,
      gstType: 'intra',
      note: 'Stock added via inventory',
      date: new Date().toISOString()
  });
  
  save(); updateStats(); renderDash(); renderInv(); closeAddStock();
  toast('✓ ' + m + 'm added to ' + f.name + '!');
}

// ══ QUICK SELL ══
function openQS(id){
  qsFabId = id;
  var f = inv.find(function(f){ return f.id === id; });
  if(!f) return;
  
  document.getElementById('qs-fab-name').textContent = f.name + ' — Available: ' + f.meters + 'm';
  document.getElementById('qs-m').value = '';
  document.getElementById('qs-r').value = f.rate || '';
  document.getElementById('qs-discount').value = '';
  document.getElementById('qs-paid').value = '';
  document.getElementById('qs-c').value = '';
  document.getElementById('qs-buyer-gstin').value = '';
  document.getElementById('qs-email').value = '';
  document.getElementById('qs-phone').value = '';
  
  document.getElementById('qs-amt').textContent = '₹0';
  document.getElementById('qs-gst-breakdown').innerHTML = '';
  document.getElementById('quicksell-modal').classList.add('on');
  document.getElementById('qs-m').focus();
}

function closeQS(){ document.getElementById('quicksell-modal').classList.remove('on'); }

function calcQSAmt(){
  var m = parseFloat(document.getElementById('qs-m').value) || 0;
  var r = parseFloat(document.getElementById('qs-r').value) || 0;
  var rate = parseFloat(document.getElementById('qs-gst-rate').value) || 0;
  var type = document.getElementById('qs-gst-type').value;
  var discount = parseFloat(document.getElementById('qs-discount').value) || 0;
  
  var sub = m * r;
  var subAfterDiscount = Math.max(0, sub - discount);
  var g = calcGST(subAfterDiscount, rate, type);
  
  document.getElementById('qs-amt').textContent = fv(g.total);
  document.getElementById('qs-gst-breakdown').innerHTML = gstBreakdownHTML(g, type);
}

function _doQSSale(withBill){
  var m = parseFloat(document.getElementById('qs-m').value);
  var r = parseFloat(document.getElementById('qs-r').value);
  var cust = document.getElementById('qs-c').value.trim() || 'Walk-in';
  var f = inv.find(function(f){ return f.id === qsFabId; });
  
  if(!f){ toast('Error!'); return; }
  if(!m || m <= 0){ toast('Enter meters!'); return; }
  if(m > f.meters){ toast('Only ' + f.meters + 'm available!'); return; }
  
  var rate = r || f.rate;
  var gstRate = parseFloat(document.getElementById('qs-gst-rate').value) || 0;
  var gstType = document.getElementById('qs-gst-type').value;
  var discount = parseFloat(document.getElementById('qs-discount').value) || 0;
  
  var subAfterDiscount = Math.max(0, (m * rate) - discount);
  var g = calcGST(subAfterDiscount, gstRate, gstType);
  
  var invType = document.getElementById('qs-inv-type').value;
  var payMode = document.getElementById('qs-pay-mode').value;
  var paidInput = parseFloat(document.getElementById('qs-paid').value);
  var paidAmt = isNaN(paidInput) ? (invType === 'Credit' ? 0 : g.total) : paidInput;
  var dueAmt = g.total - paidAmt;

  f.meters -= m;
  
  var custEmail = (document.getElementById('qs-email') || {value:''}).value.trim();
  var custPhone = (document.getElementById('qs-phone') || {value:''}).value.trim().replace(/\D/g,'');
  var buyerGstin = (document.getElementById('qs-buyer-gstin') || {value:''}).value.trim();
  
  var saleData = {
      id: Date.now(),
      fabId: f.id,
      fabName: f.name,
      meters: m,
      rate: rate,
      subtotal: subAfterDiscount,
      discount: discount,
      invType: invType,
      payMode: payMode,
      paidAmt: paidAmt,
      dueAmt: dueAmt,
      gstRate: gstRate,
      gstType: gstType,
      gstAmount: g.gstAmount,
      cgst: g.cgst,
      sgst: g.sgst,
      igst: g.igst,
      total: g.total,
      customer: cust,
      customerEmail: custEmail,
      customerPhone: custPhone,
      buyerGstin: buyerGstin,
      note: '',
      date: new Date().toISOString()
  };
  
  sales.unshift(saleData);
  save(); updateStats(); renderDash(); renderInv(); closeQS();
  
  toast('✓ ' + m + 'm ' + f.name + ' sold — ' + fv(g.total));
  
  if(f.meters < f.threshold){
    emailjs.send(EJS_SVC, EJS_ALERT_TPL, {
        fabric_name: f.name,
        meters: f.meters,
        threshold: f.threshold,
        to_email: user ? user.email : '',
        to_name: user ? user.displayName : 'Shop Owner'
    }).catch(function(e){ console.log('Low stock alert err:', e); });
  }
  
  if(withBill) setTimeout(function(){ generateBill(saleData); }, 300);
}

function saveQS(){ _doQSSale(false); }
function saveQSAndBill(){ _doQSSale(true); }

  var sel = document.getElementById('s-fab');
  sel.innerHTML = inv.length ? inv.map(function(f){ return '<option value="'+f.id+'" data-rate="'+f.rate+'">'+esc(f.name)+' ('+f.meters+'m)</option>'; }).join('') : '<option>Add stock first</option>';
  if(inv.length){
      document.getElementById('s-r').value = inv[0].rate || '';
      calcSaleAmt();
  }
}

function onFabChange(){
    var opt = document.getElementById('s-fab').options[document.getElementById('s-fab').selectedIndex];
    document.getElementById('s-r').value = (opt && opt.dataset && opt.dataset.rate) || '';
    calcSaleAmt();
}

function calcSaleAmt(){
  var m = parseFloat(document.getElementById('s-m').value) || 0;
  var r = parseFloat(document.getElementById('s-r').value) || 0;
  var rate = parseFloat(document.getElementById('s-gst-rate').value) || 0;
  var type = document.getElementById('s-gst-type').value;
  var discount = parseFloat(document.getElementById('s-discount').value) || 0;
  
  var sub = m * r;
  var subAfterDiscount = Math.max(0, sub - discount);
  var g = calcGST(subAfterDiscount, rate, type);
  
  document.getElementById('s-subtotal').textContent = fv(sub) + (discount > 0 ? ' (Disc: -₹'+discount+')' : '');
  document.getElementById('s-amt').textContent = fv(g.total);
  document.getElementById('s-gst-breakdown').innerHTML = gstBreakdownHTML(g, type);
}

function _doSale(withBill){
  var id = parseInt(document.getElementById('s-fab').value);
  var m = parseFloat(document.getElementById('s-m').value);
  var r = parseFloat(document.getElementById('s-r').value);
  var cust = document.getElementById('s-c').value.trim() || 'Walk-in';
  var note = document.getElementById('s-n').value.trim();
  
  var f = inv.find(function(f){ return f.id === id; });
  if(!f){ toast('Select a fabric!'); return; }
  if(!m || m <= 0){ toast('Enter meters!'); return; }
  if(m > f.meters){ toast('Only ' + f.meters + 'm available!'); return; }
  
  var rate = r || f.rate;
  var gstRate = parseFloat(document.getElementById('s-gst-rate').value) || 0;
  var gstType = document.getElementById('s-gst-type').value;
  var discount = parseFloat(document.getElementById('s-discount').value) || 0;
  var buyerGstin = document.getElementById('s-buyer-gstin').value.trim();
  
  var subAfterDiscount = Math.max(0, (m * rate) - discount);
  var g = calcGST(subAfterDiscount, gstRate, gstType);
  
  var invType = document.getElementById('s-inv-type').value;
  var payMode = document.getElementById('s-pay-mode').value;
  var paidInput = parseFloat(document.getElementById('s-paid').value);
  var paidAmt = isNaN(paidInput) ? (invType === 'Credit' ? 0 : g.total) : paidInput;
  var dueAmt = g.total - paidAmt;

  f.meters -= m;
  
  var saleData = {
      id: Date.now(),
      fabId: id,
      fabName: f.name,
      meters: m,
      rate: rate,
      subtotal: subAfterDiscount,
      discount: discount,
      invType: invType,
      payMode: payMode,
      paidAmt: paidAmt,
      dueAmt: dueAmt,
      gstRate: gstRate,
      gstType: gstType,
      gstAmount: g.gstAmount,
      cgst: g.cgst,
      sgst: g.sgst,
      igst: g.igst,
      total: g.total,
      customer: cust,
      buyerGstin: buyerGstin,
      note: note,
      date: new Date().toISOString()
  };
  
  sales.unshift(saleData);
  save(); updateStats(); renderSalesList(); fillSD();
  
  toast('✓ ' + m + 'm ' + f.name + ' sold — ' + fv(g.total));
  
  ['s-m','s-c','s-n','s-buyer-gstin','s-discount','s-paid'].forEach(function(i){ document.getElementById(i).value=''; });
  document.getElementById('s-amt').textContent = '₹0';
  document.getElementById('s-subtotal').textContent = '₹0';
  document.getElementById('s-gst-breakdown').innerHTML = '';
  
  if(f.meters < f.threshold){
    emailjs.send(EJS_SVC, EJS_ALERT_TPL, {
        fabric_name: f.name,
        meters: f.meters,
        threshold: f.threshold,
        to_email: user ? user.email : '',
        to_name: user ? user.displayName : 'Shop Owner'
    }).catch(function(e){ console.log('Low stock alert err:', e); });
  }
  
  if(withBill) setTimeout(function(){ generateBill(saleData); }, 300);
}

function recSale(){ _doSale(false); }
function recSaleAndBill(){ _doSale(true); }

function renderSalesList(){
  var el = document.getElementById('sales-list');
  if(!el) return;
  if(!sales.length){
      el.innerHTML='<div class="empty" style="padding:30px"><div class="empty-ic">📋</div><div class="empty-t">No Sales Yet</div></div>';

      +'<div><div style="font-family:var(--ff-h);font-size:14px;font-weight:700">'+esc(s.fabName)+'</div>'

function renderLedgerSummary(){
  var totalSales = sales.reduce(function(a,s){ return a + s.total; }, 0);
  var totalPurchases = purchases.reduce(function(a,p){ return a + p.total; }, 0);
  var net = totalSales - totalPurchases;
  
  document.getElementById('ls-total-sales').textContent = fv(totalSales);
  document.getElementById('ls-sales-count').textContent = sales.length + ' entries';
  document.getElementById('ls-total-purchases').textContent = fv(totalPurchases);
  document.getElementById('ls-purchases-count').textContent = purchases.length + ' entries';
  
  var netEl = document.getElementById('ls-net-profit');
  netEl.textContent = fv(Math.abs(net));
  netEl.style.color = net >= 0 ? 'var(--green2)' : 'var(--red)';
}

function renderLedger(){
  var q = (document.getElementById('ledger-q')||{value:''}).value.toLowerCase();
  var el = document.getElementById('ledger-grid');
  if(!el) return;
  
  var list = activeLedgerTab === 'sales' ? sales : purchases;
  var filtered = list.filter(function(e){
    return (e.fabName || e.item || '').toLowerCase().includes(q) || 
           (e.customer || e.party || '').toLowerCase().includes(q) || 
           String(e.total).includes(q);
  });
  
  if(!filtered.length){
    el.innerHTML='<div class="empty"><div class="empty-ic">'+(activeLedgerTab==='sales'?'💰':'📥')+'</div><div class="empty-t">Koi record nahi</div><div class="empty-s">'+(activeLedgerTab==='sales'?'Koi bikri record karo':'Koi purchase record karo')+'</div></div>';
    return;
  }
  
  el.innerHTML = filtered.map(function(e){
    var isSale = activeLedgerTab === 'sales';
    var party = isSale ? (e.customer || 'Walk-in') : (e.party || 'Unknown');
    var item = isSale ? e.fabName : (e.item || '—');
    var qty = e.meters ? e.meters + 'm' : '—';
    var rate = e.rate ? '₹' + e.rate + '/m' : '—';
    var d = new Date(e.date);
    var dateStr = d.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
    
    var gstInfo = '';
    if(e.gstRate > 0){
      gstInfo = '<span style="font-size:10px;background:var(--blue-light);color:var(--blue);border-radius:5px;padding:1px 7px;font-weight:600;margin-left:4px">GST '+e.gstRate+'% ('+e.gstType.toUpperCase()+')</span>';
    }
    
    var gstin = isSale ? (e.buyerGstin || '') : (e.supplierGstin || '');
    var gstinTag = gstin ? '<span style="font-size:10px;color:var(--muted);margin-left:4px">GSTIN: '+esc(gstin)+'</span>' : '';
    
    return '<div class="ledger-entry '+(isSale?'sale-entry':'purchase-entry')+'">'
      +'<div class="le-icon '+(isSale?'sale':'purchase')+'">'+(isSale?'💰':'📥')+'</div>'
      +'<div>'
        +'<div class="le-name">'+esc(item)+'</div>'
        +'<div class="le-meta">'+esc(party)+' · '+qty+' · '+rate+gstInfo+gstinTag+'</div>'
        +(e.note ? '<div style="font-size:11px;color:var(--muted);margin-top:2px;font-style:italic">'+esc(e.note)+'</div>' : '')
      +'</div>'
      +'<div class="le-date">'+dateStr+'</div>'
      +'<div class="le-amount '+(isSale?'sale':'purchase')+'">'+fv(e.total)+'</div>'
    +'</div>';
  }).join('');
}

// ══ CALCULATORS ══
function c1(){
    document.getElementById('c1-r').textContent = fv((parseFloat(document.getElementById('c1m').value)||0) * (parseFloat(document.getElementById('c1r').value)||0));
}
function c2(){
  var b = parseFloat(document.getElementById('c2b').value)||0, s = parseFloat(document.getElementById('c2s').value)||0, m = parseFloat(document.getElementById('c2m').value)||0;
  var pm = s - b, tot = pm * m;
  var pe = document.getElementById('c2-pm'), te = document.getElementById('c2-r');
  pe.textContent = (pm >= 0 ? '+' : '') + fv(pm);
  te.textContent = (tot >= 0 ? '+' : '') + fv(tot);
  pe.style.color = te.style.color = pm >= 0 ? 'var(--green2)' : 'var(--red)';
}
function c3(){
  var p = parseFloat(document.getElementById('c3g').value) || 5;
  var type = document.getElementById('c3type').value;
  var a = parseFloat(document.getElementById('c3a').value) || 0;
  var g = calcGST(a, p, type);
  
  document.getElementById('c3-g').textContent = fv(g.gstAmount);
  document.getElementById('c3-t').textContent = fv(g.total);
  var bd = document.getElementById('c3-breakdown');
  if(a > 0){
    bd.style.display = 'block';
    bd.innerHTML = gstBreakdownHTML(g, type);
  } else {
    bd.style.display = 'none';
  }
}

// ══ REPORT ══
function renderReport(){
  var now = new Date();
  document.getElementById('rpt-month').textContent = now.toLocaleString('en-IN', {month:'long', year:'numeric'});
  
  var ms = sales.filter(function(s){ var d = new Date(s.date); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); });
  var sa = ms.reduce(function(a,s){ return a + s.total; }, 0);
  var sm = ms.reduce(function(a,s){ return a + s.meters; }, 0);
  var iv = inv.reduce(function(a,f){ return a + (f.meters * f.rate); }, 0);
  var lc = inv.filter(function(f){ return f.meters < f.threshold; }).length;
  
  document.getElementById('rpt-stats').innerHTML = [
    ['Sales Amount', fv(sa), 'gold'],
    ['Meters Sold', sm + 'm', ''],
    ['Stock Value', fv(iv), ''],
    ['Low Stock', lc, lc > 0 ? 'red' : '']
  ].map(function(x){
      return '<div style="background:var(--white);border:2px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow)"><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:6px">'+x[0]+'</div><div style="font-family:var(--ff-h);font-size:28px;font-weight:800;color:'+(x[2]==='gold'?'var(--gold)':x[2]==='red'?'var(--red)':'var(--text)')+'">'+x[1]+'</div></div>';
  }).join('');
  
  var mx = Math.max.apply(null, inv.map(function(f){ return f.meters; }).concat([1]));
  document.getElementById('rpt-stock').innerHTML = inv.length ? inv.map(function(f){
      return '<div class="bar-row"><div class="bar-lbl" title="'+esc(f.name)+'">'+esc(f.name)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(f.meters/mx*100)+'%"></div></div><div class="bar-val">'+f.meters+'m</div></div>';
  }).join('') : '<div style="color:var(--muted);font-size:12px">No data</div>';
  
  var sf = {};
  ms.forEach(function(s){ sf[s.fabName] = (sf[s.fabName] || 0) + s.meters; });
  var mxs = Math.max.apply(null, Object.values(sf).concat([1]));
  
  document.getElementById('rpt-sales').innerHTML = Object.keys(sf).length ? Object.entries(sf).map(function(e){
      return '<div class="bar-row"><div class="bar-lbl">'+esc(e[0])+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/mxs*100)+'%;background:var(--green2)"></div></div><div class="bar-val">'+e[1]+'m</div></div>';
  }).join('') : '<div style="color:var(--muted);font-size:12px">No sales this month</div>';
  
  document.getElementById('rpt-body').innerHTML = inv.length ? inv.map(function(f){
    var sold = ms.filter(function(s){ return s.fabId === f.id; }).reduce(function(a,s){ return a + s.meters; }, 0);
    var status = f.meters < f.threshold ? '<span class="pill pill-r">LOW</span>' : '<span class="pill pill-g">OK</span>';
    return '<div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr 80px;padding:14px 20px;border-bottom:1.5px solid var(--border);align-items:center;gap:8px">'
      +'<div><div style="font-weight:700;font-size:14px">'+esc(f.name)+'</div><div style="font-size:12px;color:var(--muted)">'+f.type+'</div></div>'
      +'<div style="color:var(--muted2)">'+(f.meters + sold)+'m</div>'
      +'<div style="color:var(--green2)">'+sold+'m</div>'
      +'<div style="font-weight:700">'+f.meters+'m</div>'
      +'<div style="color:var(--gold)">'+fv(f.meters * f.rate)+'</div>'
      +'<div>'+status+'</div>'
    +'</div>';
  }).join('') : '<div style="padding:20px;color:var(--muted);text-align:center">No data</div>';
}

      shopGstinEl.style.color = '#e8dfc8';
  }

  var buyerGstinEl = document.getElementById('bill-buyer-gstin');
  if(buyerGstinEl) buyerGstinEl.textContent = saleData.buyerGstin ? 'GSTIN: ' + saleData.buyerGstin : '';
  
  var emailEl = document.getElementById('bill-customer-email');
  if(emailEl) emailEl.textContent = saleData.customerEmail || '';

  document.getElementById('bill-inv-type').textContent = saleData.invType || 'Cash';
  document.getElementById('bill-pay-mode').textContent = saleData.payMode || 'Cash';

  var baseAmt = (saleData.meters * saleData.rate);
  document.getElementById('bill-items').innerHTML =
    '<div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4px;padding:10px 0">'
    +'<div style="font-size:14px;font-weight:600;color:#2d2416">'+esc(saleData.fabName)+'</div>'

    +'<div style="font-size:14px;font-weight:700;color:#2d2416;text-align:right">₹'+Math.round(baseAmt).toLocaleString('en-IN')+'</div>'
    +'</div>';

  if(saleData.discount > 0) {
      document.getElementById('bill-discount-section').innerHTML = '<div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:12px;color:#c0392b;width:100%"><span>Discount</span><span>-₹' + saleData.discount + '</span></div>';
  } else {
      document.getElementById('bill-discount-section').innerHTML = '';
  }

  // GST section in bill
  var gstSec = document.getElementById('bill-gst-section');
  if(gstSec){
    if(saleData.gstRate > 0){
      var g = {rate: saleData.gstRate, subtotal: saleData.subtotal || saleData.total, gstAmount: saleData.gstAmount || 0, cgst: saleData.cgst || 0, sgst: saleData.sgst || 0, igst: saleData.igst || 0};

  document.getElementById('bill-total').textContent = '₹' + Math.round(saleData.total).toLocaleString('en-IN');
  document.getElementById('bill-paid-amt').textContent = '₹' + Math.round(saleData.paidAmt || 0).toLocaleString('en-IN');
  document.getElementById('bill-due-amt').textContent = '₹' + Math.round(saleData.dueAmt || 0).toLocaleString('en-IN');

  var emailBillBtn = document.getElementById('email-bill-btn');
  if(emailBillBtn) emailBillBtn.style.display = saleData.customerEmail ? 'flex' : 'none';
  
  var waBillBtn = document.getElementById('wa-bill-btn');
  if(waBillBtn){ waBillBtn.style.display = 'flex'; waBillBtn.textContent = '💬 WhatsApp'; }
  
  document.getElementById('bill-modal').classList.add('on');
}

// ══ BILL GENERATION (PURCHASES) ══
function generatePurchaseBill(p) {
  lastSale = null;
  var billNo = 'PUR-' + Date.now().toString().slice(-6);
  var dateStr = new Date().toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
  var shopName = user && user.displayName ? user.displayName : 'Firm Name';

  // Restore header colors for Purchase if they were changed by Sales
  var topHeader = document.querySelector('#bill-preview > div:nth-child(2) > div:nth-child(1)');
  if(topHeader) {
      topHeader.style.background = 'transparent';
      topHeader.style.color = 'inherit';
      topHeader.style.padding = '0';
      topHeader.style.borderBottom = '1.5px dashed #c8b99a';
      topHeader.style.marginBottom = '18px';
      topHeader.style.paddingBottom = '18px';
  }

  var billShopNameEl = document.getElementById('bill-shop-name');
  if(billShopNameEl) {
      billShopNameEl.textContent = shopName;
      billShopNameEl.style.color = '#2d2416';
  }

  document.getElementById('bill-type-lbl').textContent = 'PURCHASE RECEIPT';
  document.getElementById('bill-type-lbl').style.color = '#8a7a5a';
  document.getElementById('bill-to-lbl').textContent = 'From / Supplier';
  document.getElementById('bill-no').textContent = billNo;
  document.getElementById('bill-date').textContent = dateStr;
  document.getElementById('bill-customer').textContent = p.party || 'Unknown';

  var shopGstinEl = document.getElementById('bill-shop-gstin');
  if(shopGstinEl) shopGstinEl.textContent = '';
  
  var buyerGstinEl = document.getElementById('bill-buyer-gstin');
  if(buyerGstinEl) buyerGstinEl.textContent = p.supplierGstin ? 'GSTIN: ' + p.supplierGstin : '';
  
  var emailEl = document.getElementById('bill-customer-email');
  if(emailEl) emailEl.textContent = '';

  document.getElementById('bill-inv-type').textContent = '-';
  document.getElementById('bill-pay-mode').textContent = '-';

  var baseAmt = (p.meters * p.rate);
  document.getElementById('bill-items').innerHTML =
    '<div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4px;padding:10px 0">'
    +'<div style="font-size:14px;font-weight:600;color:#2d2416">'+esc(p.item)+'</div>'
    +'<div style="font-size:14px;color:#2d2416;text-align:center">'+p.meters+'m</div>'
    +'<div style="font-size:14px;color:#2d2416;text-align:center">₹'+p.rate+'</div>'
    +'<div style="font-size:14px;font-weight:700;color:#2d2416;text-align:right">₹'+Math.round(baseAmt).toLocaleString('en-IN')+'</div>'
    +'</div>';

  document.getElementById('bill-discount-section').innerHTML = '';

  var gstSec = document.getElementById('bill-gst-section');
  if(gstSec){
    if(p.gstRate > 0){
      var g = {rate: p.gstRate, subtotal: p.subtotal || p.total, gstAmount: p.gstAmount || 0, cgst: p.cgst || 0, sgst: p.sgst || 0, igst: p.igst || 0};
      gstSec.innerHTML = billGSTSection(g, p.gstType || 'intra');
    } else {
      gstSec.innerHTML = '';
    }
  }
  document.getElementById('bill-total').textContent = '₹' + Math.round(p.total).toLocaleString('en-IN');

  document.getElementById('bill-paid-amt').textContent = '₹' + Math.round(p.total).toLocaleString('en-IN');
  document.getElementById('bill-due-amt').textContent = '₹0';

  var emailBillBtn = document.getElementById('email-bill-btn');
  if(emailBillBtn) emailBillBtn.style.display = 'none';
  
  var waBillBtn = document.getElementById('wa-bill-btn');
  if(waBillBtn) waBillBtn.style.display = 'none';

  document.getElementById('bill-modal').classList.add('on');
}

function closeBill(){ document.getElementById('bill-modal').classList.remove('on'); }

function printBill(){
  var billContent = document.getElementById('bill-preview').innerHTML;
  var win = window.open('','_blank','width=500,height=700');
  win.document.write('<html><head><title>Bill - StockSaathi</title><link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&display=swap" rel="stylesheet"><style>body{margin:20px;font-family:sans-serif;background:white}*{box-sizing:border-box}</style></head><body>'+billContent+'</body></html>');
  win.document.close();
  setTimeout(function(){ win.print(); }, 800);
}

function whatsappBill(){
  if(!lastSale) return;
  var shopName = user && user.displayName ? user.displayName + " ka Shop" : 'Textile Shop';
  var date = new Date().toLocaleDateString('en-IN');
  
  var msg = '*' + shopName + '*\n_StockSaathi Receipt_\n\n*Date:* ' + date + '\n*Customer:* ' + (lastSale.customer || 'Walk-in') + '\n\n---\n*' + lastSale.fabName + '*\n' + lastSale.meters + 'm x Rs.' + lastSale.rate + '/m\n';
  
  if(lastSale.discount > 0) msg += 'Discount: -Rs.' + lastSale.discount + '\n';
  
  if(lastSale.gstRate > 0){
    msg += 'Subtotal: Rs.' + Math.round(lastSale.subtotal).toLocaleString('en-IN') + '\n';
    if(lastSale.gstType === 'intra') msg += 'CGST/SGST @'+lastSale.gstRate+'%: +Rs.'+Math.round(lastSale.gstAmount).toLocaleString('en-IN')+'\n';
    else msg += 'IGST @'+lastSale.gstRate+'%: +Rs.'+Math.round(lastSale.gstAmount).toLocaleString('en-IN')+'\n';
  }
  msg += '---\n*TOTAL: Rs.' + Math.round(lastSale.total).toLocaleString('en-IN') + '*\n\nThank you! 🙏\n_StockSaathi by Niori_';
  
  var phone = lastSale.customerPhone;
  var url = phone ? 'https://wa.me/91' + phone + '?text=' + encodeURIComponent(msg) : 'https://wa.me/?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
}

function emailBill(){
  if(!lastSale || !lastSale.customerEmail){ toast('Customer email daalo pehle!'); return; }
  var shopName = user && user.displayName ? user.displayName + "'s Shop" : 'Textile Shop';
  var date = new Date().toLocaleDateString('en-IN');
  var emailBtn = document.getElementById('email-bill-btn');
  
  if(emailBtn){ emailBtn.disabled = true; emailBtn.textContent = 'Sending...'; }
  
  var gstNote = '';
  if(lastSale.gstRate > 0){
    gstNote = (lastSale.gstType === 'intra' ? 'CGST+SGST' : 'IGST') + ' @ ' + lastSale.gstRate + '% = Rs.' + Math.round(lastSale.gstAmount).toLocaleString('en-IN');
  }
  
  emailjs.send(EJS_SVC, EJS_BILL_TPL, {
    to_email: lastSale.customerEmail,
    to_name: lastSale.customer || 'Customer',
    shop_name: shopName,
    date: date,
    fabric_name: lastSale.fabName,
    meters: lastSale.meters,
    rate: lastSale.rate,
    subtotal: Math.round(lastSale.subtotal || lastSale.total).toLocaleString('en-IN'),
    gst_info: gstNote || 'No GST',
    total: Math.round(lastSale.total).toLocaleString('en-IN')
  }).then(function(){
    if(emailBtn){ emailBtn.disabled = false; emailBtn.textContent = '📧 Email'; }
    toast('📧 Bill sent to ' + lastSale.customerEmail + '!');
  }).catch(function(e){
    console.log('Email error:', e);
    if(emailBtn){ emailBtn.disabled = false; emailBtn.textContent = '📧 Email'; }
    toast('Email failed: ' + (e.text || e.message || 'Check EmailJS template'));
  });
}

function downloadBillPDF(){
  if(!lastSale) return;
  var billNo = 'BILL-' + Date.now().toString().slice(-6);
  var billContent = document.getElementById('bill-preview').innerHTML;
  var win = window.open('','_blank','width=500,height=700');
  if(!win){ toast('Popup blocked! Allow popups and try again.'); return; }
  
  win.document.write('<html><head><title>Bill-' + billNo + '</title><link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&display=swap" rel="stylesheet"><style>body{margin:0;padding:20px;background:white}*{box-sizing:border-box}@media print{body{margin:0;padding:0}}</style></head><body>' + billContent + '<script>setTimeout(function(){window.print();},800);<\/script></body></html>');
  win.document.close();
}

function downloadAndWhatsapp(){
  if(!lastSale) return;
  downloadBillPDF();
  setTimeout(function(){
    var phone = lastSale.customerPhone;
    var msg = 'Hi ' + (lastSale.customer || '') + ', please find your bill attached.';
    var url = phone ? 'https://wa.me/91' + phone + '?text=' + encodeURIComponent(msg) : 'https://wa.me/?text=' + encodeURIComponent(msg);
    toast('1. Save PDF from print dialog. 2. Attach in WhatsApp!');
    setTimeout(function(){ window.open(url, '_blank'); }, 1500);
  }, 500);
}

// ══ UTILS ══
function esc(t){ return String(t || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function toast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    clearTimeout(t._tid);
    t._tid = setTimeout(function(){ t.style.display = 'none'; }, 3500);
}

window.onload = function(){ startApp(); };
</script>
